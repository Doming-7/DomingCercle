<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DomingCercle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; }
      .calc-card { max-width: 400px; margin-top: 100px; border-radius: 15px; }
    </style>
  </head>
  <body>

    <div class="container d-flex justify-content-center">
      <div class="card shadow-sm calc-card p-4 w-100 bg-white">
        <h1 class="text-primary text-center h3 mb-1">DomingCercle</h1>
        <p class="text-muted text-center small mb-4">Calculer La surface d'un cercle online</p>
        
        <div class="mb-3">
          <label for="myText" class="form-label fw-bold">Rayon :</label>
          <input type="number" id="myText" class="form-control form-control-lg" placeholder="Entrez le rayon..." />
        </div>
        
        <button id="myBtn" class="btn btn-primary btn-lg w-100 shadow-sm" type="submit">Calculer</button>
        
        <div class="mt-4 text-center">
          <h3 id="myH3" class="text-success h4"></h3>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
